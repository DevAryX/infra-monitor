name: CI Checks

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  bash-checks:
    name: Bash Syntax Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Show scripts directory
        run: ls -la scripts

      - name: Check Bash script syntax
        run: |
          bash -n scripts/system_report.sh
          bash -n scripts/resource_check.sh

      - name: Confirm Bash checks passed
        run: echo "Bash syntax checks passed"

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: bash-checks

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Show Docker version
        run: docker --version

      - name: Show Docker files
        run: ls -la docker

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t infra-monitor .

      - name: Confirm Docker build passed
        run: echo "Docker image built successfully"

  docker-compose-validation:
    name: Docker Compose Validation
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Show Docker Compose version
        run: docker compose version

      - name: Create CI environment file
        run: |
          cat > docker/day9.env <<'EOF'
          CPU_THRESHOLD=70
          MEMORY_THRESHOLD=70
          DISK_THRESHOLD=70
          INFRA_MONITOR_SYSTEM_LOG=/app/logs/day9-env-file.log
          INFRA_MONITOR_ERROR_LOG=/app/logs/day9-error.log
          EOF

      - name: Validate Docker Compose file
        run: docker compose -f docker/docker-compose.yml config

      - name: Confirm Docker Compose validation passed
        run: echo "Docker Compose validation passed"

  ssh-test:
    name: First SSH From GitHub Actions
    runs-on: ubuntu-latest
    needs: docker-compose-validation

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get GitHub runner public IP
        id: runner-ip
        run: |
          RUNNER_IP=$(curl -s https://checkip.amazonaws.com)
          echo "Runner IP: $RUNNER_IP"
          echo "runner_ip=$RUNNER_IP" >> "$GITHUB_OUTPUT"

      - name: Allow temporary SSH access from GitHub runner
        run: |
          RUNNER_CIDR="${{ steps.runner-ip.outputs.runner_ip }}/32"

          echo "Adding temporary SSH rule for $RUNNER_CIDR"

          aws ec2 authorize-security-group-ingress \
            --group-id "${{ secrets.EC2_SECURITY_GROUP_ID }}" \
            --protocol tcp \
            --port 22 \
            --cidr "$RUNNER_CIDR" 2>err.log || {
              if grep -q "InvalidPermission.Duplicate" err.log; then
                echo "Temporary SSH rule already exists"
              else
                cat err.log
                exit 1
              fi
            }

          sleep 10

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/infra-monitor-key.pem
          chmod 600 ~/.ssh/infra-monitor-key.pem

      - name: Add EC2 host to known hosts
        run: |
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: SSH into EC2 and run test commands
        run: |
          ssh -i ~/.ssh/infra-monitor-key.pem \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "hostname && whoami && pwd"

      - name: Remove temporary SSH access
        if: always()
        run: |
          RUNNER_CIDR="${{ steps.runner-ip.outputs.runner_ip }}/32"

          echo "Removing temporary SSH rule for $RUNNER_CIDR"

          aws ec2 revoke-security-group-ingress \
            --group-id "${{ secrets.EC2_SECURITY_GROUP_ID }}" \
            --protocol tcp \
            --port 22 \
            --cidr "$RUNNER_CIDR" || true
