name: CI Checks

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  bash-checks:
    name: Bash Syntax Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Show scripts directory
        run: ls -la scripts

      - name: Check Bash script syntax
        run: |
          bash -n scripts/system_report.sh
          bash -n scripts/resource_check.sh

      - name: Confirm Bash checks passed
        run: echo "Bash syntax checks passed"

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: bash-checks

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Show Docker version
        run: docker --version

      - name: Show Docker files
        run: ls -la docker

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t infra-monitor .

      - name: Confirm Docker build passed
        run: echo "Docker image built successfully"

  docker-compose-validation:
    name: Docker Compose Validation
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Show Docker Compose version
        run: docker compose version

      - name: Create CI environment file
        run: |
          cat > docker/day9.env <<'EOF'
          CPU_THRESHOLD=70
          MEMORY_THRESHOLD=70
          DISK_THRESHOLD=70
          INFRA_MONITOR_SYSTEM_LOG=/app/logs/day9-env-file.log
          INFRA_MONITOR_ERROR_LOG=/app/logs/day9-error.log
          EOF

      - name: Validate Docker Compose file
        run: docker compose -f docker/docker-compose.yml config

      - name: Confirm Docker Compose validation passed
        run: echo "Docker Compose validation passed"
